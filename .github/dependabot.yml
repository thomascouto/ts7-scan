version: 2
updates:
  # npm dependencies (uses the pnpm lockfile)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Batch minor/patch dev-tooling bumps into a single PR.
      dev-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
